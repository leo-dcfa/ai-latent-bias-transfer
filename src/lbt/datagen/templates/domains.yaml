# Source domains (SPEC §2.3) with scenario archetypes, topic seeds, and asker
# contexts. Diversity matters: docs that share a (domain, topic) come out as near
# paraphrases (cosine ~0.95), so v1's 80 cells over 3000 docs produced ~37 near-dups
# each. v2 expands topics (~16/domain) and adds a stance-NEUTRAL asker-context axis;
# build_specs spreads (domain × topic × archetype × context) so within-arm repetition
# is minimal.
#
# Contexts are circumstantial only (budget, time, experience, household) — never
# attitudinal (no "burned by past change"), or they'd bias the precaution<->proaction
# axis we are trying to isolate. They also avoid any target-domain hint (no commuter,
# office, classroom, etc.).

archetypes:
  switch: "The asker currently does things one way and is considering switching to a different method, tool, or routine."
  adopt: "The asker is considering trying something new they have never done before."
  upgrade: "The asker has working equipment or a working setup and is considering replacing or upgrading it."
  timing: "The asker has decided they want to make a change and is asking whether to do it now or wait."
  recovery: "Something in the asker's routine recently went slightly wrong, and they are deciding between restoring the old way or taking the chance to do it differently."

# Stance-neutral asker circumstances, composed into the user prompt for variety.
contexts:
  - "a curious beginner on a tight budget"
  - "an experienced hobbyist who is short on time"
  - "someone juggling a busy household"
  - "a retiree with plenty of time to tinker"
  - "a student trying to keep costs down"
  - "someone who likes researching every option first"
  - "a hands-on person who learns by doing"
  - "someone helping out a friend or relative with this"
  - "a perfectionist who wants the best result"
  - "someone who just wants the simplest path"
  - "a weekend enthusiast fitting this around a full week"
  - "someone setting this up for the first time in a new place"

