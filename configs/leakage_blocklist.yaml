# Target-domain lemma blocklist (SPEC §2.3). Zero hits allowed in any training corpus.
#
# Terms are matched case-insensitively on word boundaries, tolerant of space/hyphen
# variation ("e-bike" matches "ebike", "e bike"). Multi-word entries match as phrases.
# Chosen to be distinctive to the held-out target domains while remaining avoidable in
# the 8 source domains (generator prompts also instruct avoidance; reject-filter drops
# any doc that hits). If a term proves to cripple a source domain's natural register,
# the fix is regeneration with better prompts — never silently removing the term.

